name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@latest

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Generate Windows resource
        run: go-winres make --in winres/winres.json --arch amd64 --out cmd/vrshare/rsrc

      - name: Build
        run: go build -tags desktop,production -ldflags "-s -w -H=windowsgui" -o vrshare.exe ./cmd/vrshare/
        env:
          CGO_ENABLED: '0'

      - name: Create release zip
        run: |
          New-Item -ItemType Directory -Path release -Force
          Copy-Item vrshare.exe release/
          Copy-Item README.md release/
          Copy-Item LICENSE release/
          Copy-Item -Recurse bundle/ffmpeg release/ffmpeg
          Compress-Archive -Path release/* -DestinationPath vrshare-windows-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vrshare-windows-x64.zip
          generate_release_notes: true
