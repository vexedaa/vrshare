name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install go-winres
        run: go install github.com/tc-hib/go-winres@latest

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Generate Windows resource
        run: go-winres make --in winres/winres.json --arch amd64 --out cmd/vrshare/rsrc

      - name: Build
        run: go build -tags desktop,production -ldflags "-s -w" -o vrshare.exe ./cmd/vrshare/

      - name: Create release zip
        run: Compress-Archive -Path vrshare.exe, README.md, LICENSE -DestinationPath vrshare-windows-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vrshare-windows-x64.zip
            vrshare.exe
          generate_release_notes: true
